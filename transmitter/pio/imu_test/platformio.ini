; KK-track BNO085 — ESP-IDF 纯 C（PlatformIO，与昨天 .pio 方式相同）
; 在 Cursor/VS Code 用 PlatformIO 扩展打开本目录，点 Upload / Monitor

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
upload_speed = 115200
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
