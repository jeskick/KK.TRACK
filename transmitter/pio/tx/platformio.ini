; 与 transmitter/pio/imu_test 相同 — 勿加 upload/partition 额外项
[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
upload_speed = 115200
upload_flags =
    --no-stub
    --connect-attempts
    25
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
