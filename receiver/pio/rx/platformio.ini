; Same as imu_test + board flash size; upload see docs/BUILD.md
;
; 两个构建变体（互不影响，分区表完全一致，OTA 互通）：
;   pio run                       -> esp32-c3        调试版：保留串口日志(WARN)，便于现场排障
;   pio run -e esp32-c3-release    -> esp32-c3-release 正式版：去日志字符串，体积更小、启动更快
; flash_rx.ps1 / 默认 pio run 只构建调试版（default_envs），现有烧录流程不变。
[platformio]
default_envs = esp32-c3

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
; 让 PlatformIO 体积检查/百分比按真实 app 槽(ota_0=1700K)计算，而非默认 singleapp 的 1MB。
; 注意：实际烧录的分区表仍由 sdkconfig 的 TWO_OTA_LARGE 决定（IDF flash_project_args），
; 此项仅修正 PlatformIO 自身的体积显示，不改变真实 flash 布局（已核对 flasher_args 不变）。
board_build.partitions = partitions_two_ota_large.csv
upload_speed = 115200
; 外接 TTL：不用 stub，避免写到一半芯片跑固件往串口打日志 (0x45='E')
upload_flags =
    --no-stub
    --connect-attempts
    25
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
; tools/pio_fw_version.py: bump VERSION + copy ota/RX.x.y.z.bin or TX.x.y.z.bin
extra_scripts =
    pre:extra_script_gen_web.py
    pre:../../../tools/pio_fw_version.py
    post:extra_script_idf_upload.py

; 调试版（默认）：sdkconfig.defaults 的 WARN 日志保持开启
[env:esp32-c3]

; 正式版：在 sdkconfig.defaults 基础上叠加 sdkconfig.defaults.esp32-c3-release（关日志/控制台）。
; PlatformIO espidf 不会自动读取 sdkconfig.defaults.<env>，需显式经 SDKCONFIG_DEFAULTS 传入。
[env:esp32-c3-release]
extends = env:esp32-c3
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esp32-c3-release
