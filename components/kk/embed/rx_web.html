<!DOCTYPE html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KK RX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1419;color:#e7ecf3;line-height:1.4;padding:10px;max-width:480px;margin:0 auto;font-size:14px}
h1{font-size:1.1rem;margin-bottom:10px;color:#8ec8ff}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.topbar h1{margin-bottom:0;flex:1}
.ver-box{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:.72rem;color:#8b98a8;white-space:nowrap}
.ver-box b{color:#8ec8ff;font-weight:600}
h2{font-size:.88rem;margin:0 0 8px;color:#9aa7b8;font-weight:600}
.card{background:#1a2332;border-radius:10px;padding:10px;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.status-line{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}
.status-line:last-child{margin-bottom:0}
.st{display:flex;align-items:baseline;gap:5px;flex:1;min-width:0}
.st label{font-size:.78rem;color:#8b98a8;white-space:nowrap}
.val{font-size:.88rem;font-weight:600;white-space:nowrap}
.line{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.line>label{color:#b8c5d6;font-size:.82rem;white-space:nowrap}
.slider-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.slider-lbl{flex:0 0 88px;color:#b8c5d6;font-size:.78rem;white-space:nowrap}
.slider-row input[type=range],.scale-line input[type=range]{flex:1;min-width:0;margin:0}
.slider-row input[type=range]{height:24px}
.scale-cell{display:flex;flex-direction:column;gap:4px;min-width:0}
.scale-cell label{font-size:.78rem;color:#b8c5d6}
.scale-line{display:flex;align-items:center;gap:6px}
.scale-line input[type=range]{height:22px}
.pct{flex:0 0 38px;font-size:.78rem;color:#8ec8ff;text-align:right;font-weight:600}
.in-num{width:52px;padding:5px 4px;border:1px solid #2d3a4d;border-radius:6px;background:#121a24;color:#fff;font-size:13px;text-align:center;-moz-appearance:textfield}
.in-num::-webkit-outer-spin-button,.in-num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sel{width:52px;padding:4px;border:1px solid #2d3a4d;border-radius:6px;background:#121a24;color:#fff;font-size:14px}
.sel-y{width:62px}
.hint{font-size:.68rem;color:#6d7a8a;margin:-2px 0 8px;line-height:1.35}
.btns{display:flex;gap:8px;margin-top:6px}
.btn{flex:1;padding:10px;border:0;border-radius:8px;font-size:.9rem;color:#fff;background:#3d4a5c}
.msg{flex:2;font-size:.75rem;color:#7dffb2;line-height:2.2;text-align:right}
.chk{display:flex;align-items:center;gap:4px;color:#b8c5d6;font-size:.85rem}
.chk input{width:16px;height:16px}
.gest-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.gest-ms{flex:1;min-width:0;margin-bottom:0!important}
.ota-line{display:flex;align-items:center;gap:8px;margin-bottom:8px;min-width:0}
.ota-line input[type=file]{flex:1;min-width:0;width:0;font-size:.72rem;color:#b8c5d6}
.btn.btn-ota{flex:0 0 auto;width:auto;white-space:nowrap;padding:10px 14px;font-size:.85rem}
.ota-st{display:flex;flex-direction:column;gap:4px;font-size:.78rem}
.ota-st .pct{text-align:left;color:#8ec8ff;font-weight:600}
.ota-st .msg{text-align:left;line-height:1.35;color:#7dffb2}
</style>
</head><body>
<div class="topbar"><h1>KK-TRACK RX</h1><div class="ver-box"><span>RX <b id="ver_rx">--</b></span><span>TX <b id="ver_tx">--</b></span></div></div>
<div class="card">
<div class="status-line">
<span class="st"><label>LR µs</label><span class="val" id="plr">--</span></span>
<span class="st"><label>UD µs</label><span class="val" id="pud">--</span></span>
</div>
<div class="status-line">
<span class="st"><label>解耦%</label><span class="val" id="v_str">--</span></span>
<span class="st"><label>阈值%</label><span class="val" id="v_dom">--</span></span>
</div>
</div>
<div class="card">
<h2>设置 <span class="msg" id="msg"></span></h2>
<div class="line">
<label>协议</label><select class="sel sel-y" id="rc_proto"></select>
<label>YAW→CH</label><select class="sel" id="ch_lr"></select>
<label>PITCH→CH</label><select class="sel" id="ch_ud"></select>
</div>
<div class="line">
<label>YAW°</label><select class="sel" id="mount_horiz"></select>
<label>PITCH°</label><select class="sel" id="mount_lr"></select>
<label>ROLL°</label><select class="sel" id="mount_fb"></select>
</div>
<p class="hint">安装：YAW←Z PITCH←X，保存同步 TX</p>
<div class="line">
<label>YAW舵机</label><select class="sel sel-y" id="yaw_servo"></select>
<label class="chk"><input type="checkbox" id="rev_lr">YAW-REV</label>
<label class="chk"><input type="checkbox" id="rev_ud">PITCH-REV</label>
</div>
<p class="hint">YAW 180/270°舵机；PITCH 固定180°</p>
<div class="slider-row">
<label class="slider-lbl">YAW-OFFSET</label>
<input type="range" id="off_lr_s" min="-400" max="400" step="1">
<input class="in-num" type="number" id="off_lr" min="-400" max="400">
</div>
<div class="slider-row">
<label class="slider-lbl">PITCH-OFFSET</label>
<input type="range" id="off_ud_s" min="-400" max="400" step="1">
<input class="in-num" type="number" id="off_ud" min="-400" max="400">
</div>
<div class="grid2">
<div class="scale-cell">
<label>YAW→SERVO</label>
<div class="scale-line"><input type="range" id="scale_lr_s" min="1" max="100" step="1"><span class="pct" id="scale_lr_pct">100%</span></div>
</div>
<div class="scale-cell">
<label>PITCH→SERVO</label>
<div class="scale-line"><input type="range" id="scale_ud_s" min="1" max="100" step="1"><span class="pct" id="scale_ud_pct">100%</span></div>
</div>
</div>
<p class="hint">比例 50=100% 100=150% 1=50%</p>
<div class="gest-row">
<label>回中°</label><select class="sel sel-y" id="gest_roll"></select>
<div class="slider-row gest-ms">
<label class="slider-lbl">超时ms</label>
<input type="range" id="gest_ms_s" min="500" max="2000" step="100">
<input class="in-num" type="number" id="gest_ms" min="500" max="2000" step="100">
</div>
</div>
<p class="hint">左右摆到角度后回正即回中</p>
<div class="line">
<label class="chk"><input type="checkbox" id="track_dec" checked>轴解耦</label>
<label class="chk"><input type="checkbox" id="track_mob" checked>移动检测</label>
</div>
<div class="slider-row">
<label class="slider-lbl">解耦抑制%</label>
<input type="range" id="dec_str_s" min="10" max="95" step="1" value="85">
<input class="in-num" type="number" id="dec_str" min="10" max="95" step="1" value="85">
</div>
<div class="slider-row">
<label class="slider-lbl">检测阈值%</label>
<input type="range" id="dec_dom_s" min="35" max="65" step="1" value="45">
<input class="in-num" type="number" id="dec_dom" min="35" max="65" step="1" value="45">
</div>
<p class="hint">解耦70–90；阈值越小越早介入</p>
<div class="btns"><button type="button" class="btn" id="btnReset">重置</button></div>
</div>
<div class="card">
<h2>OTA</h2>
<div class="ota-line">
<input type="file" id="ota_file" accept=".bin">
<button type="button" class="btn btn-ota" id="btnOta">开始升级</button>
</div>
<div class="ota-st"><span class="pct" id="ota_pct"></span><span class="msg" id="ota_msg"></span></div>
</div>
<script>
const $=id=>document.getElementById(id);
const val=(id,d='')=>{const e=$(id);return e?e.value:d};
const chk=id=>!!($(id)&&$(id).checked);
const scalePct=v=>Math.round((0.5+v/100)*100)+'%';
const API={cfg:'/api/config',st:'/api/status',save:'/api/save',rst:'/api/reset',ota:'/api/ota/status',orx:'/api/ota/rx',otx:'/api/ota/tx'};
let saveT=null,loading=false;
function fillSel(sel,vals,v,pre){
  sel.innerHTML='';
  vals.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=(pre||'')+d+(pre?'':'°');o.selected=(d==v);sel.appendChild(o);});
}
function bindPair(s,n,onchg){
  const pull=()=>{n.value=s.value;if(onchg)onchg();};
  s.oninput=()=>{pull();scheduleSave();};
  n.oninput=()=>{s.value=n.value;pull();scheduleSave();};
  pull();
}
function updScalePct(){
  $('scale_lr_pct').textContent=scalePct($('scale_lr_s').value);
  $('scale_ud_pct').textContent=scalePct($('scale_ud_s').value);
}
function loadCfg(d){
  loading=true;
  fillSel($('rc_proto'),[0,1,2],d.rc_proto!=null?d.rc_proto:0,'');
  $('rc_proto').options[0].textContent='PPM';$('rc_proto').options[1].textContent='SBUS';$('rc_proto').options[2].textContent='CRSF';
  fillSel($('ch_lr'),[5,6,7,8],d.ch_lr,'CH');
  fillSel($('ch_ud'),[5,6,7,8],d.ch_ud,'CH');
  $('off_lr').value=d.offset_lr;$('off_lr_s').value=d.offset_lr;
  $('off_ud').value=d.offset_ud;$('off_ud_s').value=d.offset_ud;
  $('scale_lr_s').value=d.scale_lr||50;
  $('scale_ud_s').value=(d.scale_ud!=null)?d.scale_ud:(d.scale_lr||50);
  updScalePct();
  fillSel($('yaw_servo'),[180,270],d.yaw_servo_deg||180);
  $('rev_lr').checked=!!d.rev_lr;$('rev_ud').checked=!!d.rev_ud;
  fillSel($('mount_horiz'),[0,90,180,270],d.mount_horiz||0);
  fillSel($('mount_lr'),[0,90,180,270],d.mount_lr||0);
  fillSel($('mount_fb'),[0,90,180,270],d.mount_fb||0);
  fillSel($('gest_roll'),[20,30,40],d.gest_roll_deg||20);
  $('gest_ms').value=d.gest_swing_ms||1500;$('gest_ms_s').value=d.gest_swing_ms||1500;
  $('track_dec').checked=!!d.track_decouple_en;
  $('track_mob').checked=!!d.track_motion_en;
  const str=(d.track_decouple_str_x100!=null)?d.track_decouple_str_x100:85;
  const dom=(d.track_decouple_dom_x10!=null)?d.track_decouple_dom_x10:45;
  $('dec_str').value=str;$('dec_str_s').value=str;
  $('dec_dom').value=dom;$('dec_dom_s').value=dom;
  $('v_str').textContent=str+'%';$('v_dom').textContent=dom+'%';
  loading=false;
}
const CHS=[5,6,7,8];
function bumpCh(v){const i=CHS.indexOf(parseInt(v,10));return String(CHS[(i+1)%CHS.length]);}
function fixCh(ch){
  const lr=$('ch_lr'),ud=$('ch_ud');
  if(lr.value!==ud.value)return;
  (ch==='ch_lr'?ud:lr).value=bumpCh(lr.value);
}
['rc_proto','ch_lr','ch_ud','yaw_servo','rev_lr','rev_ud','mount_horiz','mount_lr','mount_fb','gest_roll','track_dec','track_mob'].forEach(id=>{
  $(id).onchange=()=>{if(id==='ch_lr'||id==='ch_ud')fixCh(id);scheduleSave();};
});
function bindSliders(){
  bindPair($('dec_str_s'),$('dec_str'));
  bindPair($('dec_dom_s'),$('dec_dom'));
  bindPair($('off_lr_s'),$('off_lr'));
  bindPair($('off_ud_s'),$('off_ud'));
  bindPair($('gest_ms_s'),$('gest_ms'));
  $('scale_lr_s').oninput=()=>{updScalePct();scheduleSave();};
  $('scale_ud_s').oninput=()=>{updScalePct();scheduleSave();};
}
async function doSave(){
  if(loading)return;
  if(val('ch_lr','6')==val('ch_ud','7')){$('msg').textContent='通道冲突';return;}
  const p=new URLSearchParams();
  p.set('rc_proto',val('rc_proto','0'));
  p.set('ch_lr',val('ch_lr','6'));p.set('ch_ud',val('ch_ud','7'));
  p.set('offset_lr',val('off_lr','0'));p.set('offset_ud',val('off_ud','0'));
  p.set('scale_lr',val('scale_lr_s','50'));p.set('scale_ud',val('scale_ud_s','50'));
  p.set('yaw_servo_deg',val('yaw_servo','180'));
  p.set('rev_lr',chk('rev_lr')?1:0);p.set('rev_ud',chk('rev_ud')?1:0);
  p.set('mount_horiz',val('mount_horiz','0'));p.set('mount_lr',val('mount_lr','0'));p.set('mount_fb',val('mount_fb','0'));
  p.set('gest_roll_deg',val('gest_roll','20'));p.set('gest_swing_ms',val('gest_ms','1500'));
  p.set('track_decouple_en',chk('track_dec')?1:0);p.set('track_motion_en',chk('track_mob')?1:0);
  p.set('track_decouple_str_x100',val('dec_str','85'));p.set('track_decouple_dom_x10',val('dec_dom','45'));
  try{
    const j=await(await fetch(API.save,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:p.toString()})).json();
    $('msg').textContent=j.ok?'已保存':'失败';
    if(j.ok&&j.cfg)loadCfg(j.cfg);
  }catch(e){$('msg').textContent='失败';}
}
function scheduleSave(){clearTimeout(saveT);$('msg').textContent='…';saveT=setTimeout(doSave,450);}
async function poll(){
  try{
    const j=await(await fetch(API.st)).json();
    $('plr').textContent=j.ppm_lr+'µs CH'+j.ch_lr;
    $('pud').textContent=j.ppm_ud+'µs CH'+j.ch_ud;
    if(j.track_decouple_str_x100!=null)$('v_str').textContent=j.track_decouple_str_x100+'%';
    if(j.track_decouple_dom_x10!=null)$('v_dom').textContent=j.track_decouple_dom_x10+'%';
    if(j.rx_ver)$('ver_rx').textContent=j.rx_ver;
    if(j.tx_ver)$('ver_tx').textContent=j.tx_ver;
  }catch(e){}
}
$('btnReset').onclick=async()=>{
  if(!confirm('恢复默认？'))return;
  try{
    const j=await(await fetch(API.rst,{method:'POST'})).json();
    if(j.ok&&j.cfg){loadCfg(j.cfg);$('msg').textContent='已重置';}
  }catch(e){$('msg').textContent='失败';}
};
let otaPoll=null,otaUp='';
const OTA_RE=/^(RX|TX)\.\d+\.\d+\.\d+\.BIN$|^RX\.BIN$|^TX\.BIN$/;
function otaRoute(n){
  n=n.toUpperCase();
  if(!OTA_RE.test(n))return null;
  return n.startsWith('TX')?{p:API.otx,tx:1}:{p:API.orx,tx:0};
}
function fmtOta(j){
  if(!j.active)return'';
  if(j.target==='tx'){
    let s='TX '+j.pct+'%';
    if(j.written&&j.total)s+=' '+j.written+'/'+j.total;
    if(j.tx_pct)s+=' TXr'+j.tx_pct+'%';
    return s;
  }
  if(j.target==='rx'){
    let s='RX '+j.pct+'%';
    if(j.written&&j.total)s+=' '+j.written+'/'+j.total;
    return s;
  }
  return j.pct+'%';
}
async function pollOta(){
  try{
    const j=await(await fetch(API.ota)).json();
    if(j.active)$('ota_pct').textContent=fmtOta(j);
    else if(otaUp)$('ota_pct').textContent='';
    if(j.msg&&j.active)$('ota_msg').textContent=j.msg;
    if(!j.active&&otaPoll){clearInterval(otaPoll);otaPoll=null;}
  }catch(e){}
}
$('btnOta').onclick=async()=>{
  const f=$('ota_file').files[0];
  if(!f){$('ota_msg').textContent='请选择文件';return;}
  const route=otaRoute(f.name);
  if(!route){$('ota_msg').textContent='需 RX/TX x.y.z.bin';return;}
  if(!confirm('升级 '+f.name+'？勿断电'+(route.tx?' TX约3–5分':'')))return;
  otaUp=route.tx?'tx':'rx';
  $('ota_msg').textContent=route.tx?'TX传输中…':'RX上传中…';
  $('ota_pct').textContent='0%';
  if(!otaPoll)otaPoll=setInterval(pollOta,500);
  try{
    const j=await(await fetch(route.p,{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:f})).json();
    otaUp='';
    if(j.ok)$('ota_msg').textContent=route.tx?'TX完成，将重启':'RX完成，将重启';
    else{
      let m='失败';
      if(j.err)m+=':'+j.err;
      if(j.msg)m+=' '+j.msg;
      if(j.code)m+='('+j.code+')';
      if(j.max)m+=' max='+j.max;
      $('ota_msg').textContent=m;
    }
  }catch(e){$('ota_msg').textContent='连接中断';}
};
async function boot(){
  try{loadCfg(await(await fetch(API.cfg)).json());}catch(e){}
  bindSliders();poll();setInterval(poll,500);
  try{
    const j=await(await fetch(API.st)).json();
    if(j.ota_ready===0)$('ota_msg').textContent='OTA未就绪，需USB全片烧录';
  }catch(e){}
}
boot();
</script>
</body></html>
